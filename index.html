<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
     content="width=device-width,
      initial-scale=1.0", minimum-scale=1>
    <title>GIF Background Example</title>
    <style>
        header {
            height: 100px;
            background: #d3d3d3;
            display: flex;
            position: fixed;
            width: 100%;
            justify-content: center;
            align-items: center;
        }
        body {
            padding: 0;
            margin: 0;
        }
        section {
            height: 500px;
        }
    </style>
</head>

<body>
<header>
    <div class="logo"><h1>Header</h1></div>
</header>

<section style="background-color: coral;"></section>
<section style="background-color: darkseagreen;"></section>
<section style="background-color:lightskyblue;"></section>
</body>

</html>
